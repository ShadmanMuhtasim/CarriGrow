services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-CarriGrow}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-carrigrow}
      DB_USERNAME: ${DB_USERNAME:-carrigrow}
      DB_PASSWORD: ${DB_PASSWORD:-carrigrow}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${HOST_APP_PORT:-8000}:80"
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-carrigrow}
      MYSQL_USER: ${DB_USERNAME:-carrigrow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-carrigrow}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "${HOST_DB_PORT:-3307}:3306"
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/docker/init/00-schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
      - ./database/docker/init/10-reference-data.sql:/docker-entrypoint-initdb.d/10-reference-data.sql:ro

  adminer:
    image: adminer:4
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HOST_ADMINER_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  mysql-data:
